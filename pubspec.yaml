publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.6
  google_fonts: ^6.2.1
  equatable: ^2.1.0
  shared_preferences: ^2.5.5
  fl_chart: ^0.68.0
  qr_flutter: ^4.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
